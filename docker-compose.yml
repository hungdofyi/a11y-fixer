services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WEB_DIST_PATH=/app/apps/web/dist
    volumes:
      # Persist SQLite database outside container
      - a11y-data:/app/data
    restart: unless-stopped

volumes:
  a11y-data:

services:
  - type: web
    name: a11y-fixer
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://a11y-fixer.hungdo.fyi
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a random string
      - key: A11Y_DB_PATH
        value: /app/data/a11y-fixer.db
      - key: A11Y_DATA_DIR
        value: /app/data
      # Set these in Render dashboard after deploy:
      # - GOOGLE_CLIENT_ID
      # - GOOGLE_CLIENT_SECRET
      # - ALLOWED_DOMAIN
      # - A11Y_API_KEY
      # - ANTHROPIC_API_KEY
